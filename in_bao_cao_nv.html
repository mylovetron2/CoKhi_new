<!DOCTYPE HTML>
<html lang="en">
<head>
<title>Quản lý thiết bị</title>
<meta charset="utf-8">

<style>
    .table_component {
        overflow: auto;
        width: 95%;
        padding: 20px;
    }
    
    .table_component table {
        border: 1px solid #dededf;
        height: 100%;
        width: 100%;
        table-layout: fixed;
        border-collapse: collapse;
        border-spacing: 1px;
        
        
    }
    
    .table_component caption {
        caption-side: top;
        text-align: center;
    }
    
    .table_component th {
        border: 1px solid #dededf;
        background-color: #3eafdb;
        color: #000000;
        padding: 5px;
    }
    
    .table_component td {
        border: 1px solid #dededf;
        background-color: #ffffff;
        color: #000000;
        padding: 5px;
    }
  
    </style>

</head>
<body>
    
        <div class="table_component" role="region" tabindex="0">
            <caption>  LIỆT KÊ CÔNG TÁC BẢO DƯỠNG, SỬA CHỮA, CHUẨN CHỈNH THIẾT BỊ 
                <br>Từ ngày: [onshow.tungay;]   Đến ngày: [onshow.denngay;]

     </caption>
        </div>
</body>
</html>
